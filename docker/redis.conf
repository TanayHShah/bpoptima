requirepass strongpassword123

rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command KEYS ""
rename-command DEBUG ""

maxmemory 1gb
maxmemory-policy allkeys-lru

timeout 300

appendonly yes
appendfsync everysec

maxclients 100

bind 0.0.0.0

protected-mode no

loglevel notice